services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: relay_web
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
    ports:
      - "5432:5432"
    volumes:
      - relay-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - relay-redis:/data

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "npm install && npm run dev -w @relay/api"
    environment:
      DATABASE_URL: postgres://relay:relay@postgres:5432/relay_web
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ..:/app
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  worker:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "npm install && npm run dev -w @relay/worker"
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - ..:/app
    depends_on:
      - redis

  client:
    image: node:22-alpine
    working_dir: /app
    command: sh -lc "npm install && npm run dev -w @relay/client"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    volumes:
      - ..:/app
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  relay-postgres:
  relay-redis:
